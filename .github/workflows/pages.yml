name: Deploy multi-site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install React project deps
        working-directory: ./testPackage-react
        run: npm ci

      - name: Build React project
        working-directory: ./testPackage-react
        run: npm run build-react

      - name: Install Vue2 project deps
        working-directory: ./dynamicForm-Vue2-old
        run: npm ci

      - name: Build Vue2 project
        working-directory: ./dynamicForm-Vue2-old
        run: npm run build

      - name: Assemble Pages directory
        run: |
          mkdir -p pages-dist/testPackage-react
          mkdir -p pages-dist/dynamicForm-Vue2-old
          cp -r testPackage-react/dist/* pages-dist/testPackage-react/
          cp -r dynamicForm-Vue2-old/dist/* pages-dist/dynamicForm-Vue2-old/

      - name: Create root index page
        run: |
          cat > pages-dist/index.html <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>packageTest</title>
            </head>
            <body>
              <h1>packageTest</h1>
              <ul>
                <li><a href="./testPackage-react/">testPackage-react</a></li>
                <li><a href="./dynamicForm-Vue2-old/">dynamicForm-Vue2-old</a></li>
              </ul>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4